# ===================================================================
# 每日自動化管線 — GitHub Actions
# 每天 UTC 14:00（美東 10:00 開盤前）自動執行
# 拉取最新資料 → 跑分析管線 → Sonnet 信號分析 → Discord 通知 → commit
# ===================================================================

name: Daily Pipeline

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  daily-run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        continue-on-error: true
        run: python3 daily_pipeline.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          POLYMARKET_API_KEY: ${{ secrets.POLYMARKET_API_KEY }}
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}

      - name: Prepare AI briefing
        continue-on-error: true
        run: python3 ai_signal_agent.py briefing

      - name: Run Sonnet signal analysis
        continue-on-error: true
        run: python3 scripts/sonnet_analysis.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Send Discord daily report
        continue-on-error: true
        run: python3 scripts/discord_notify.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ articles/
          git diff --staged --quiet || git commit -m "chore: daily pipeline data update $(date -u +%Y-%m-%d)"
          git push
