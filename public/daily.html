<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日分析 | TRUMP CODE 川普密碼</title>
<meta name="description" content="川普每日推文 AI 分析，中英日三語。Trump daily post analysis in 3 languages.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://trumpcode.washinmura.jp/daily.html">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }
.container { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }
h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: #fff; }
.subtitle { color: #888; margin-bottom: 2rem; }
.lang-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
.lang-tab { padding: 0.5rem 1.2rem; border: 1px solid #333; border-radius: 6px; cursor: pointer; background: transparent; color: #888; font-size: 0.95rem; transition: all 0.2s; }
.lang-tab.active { background: #1a1a2e; border-color: #4a9eff; color: #4a9eff; }
.lang-tab:hover { border-color: #555; color: #ccc; }
.article-content { line-height: 1.8; font-size: 1.05rem; }
.article-content h1 { font-size: 1.5rem; margin: 1.5rem 0 1rem; color: #4a9eff; }
.article-content h2 { font-size: 1.2rem; margin: 1.5rem 0 0.8rem; color: #ccc; }
.article-content p { margin-bottom: 1rem; }
.article-content blockquote { border-left: 3px solid #4a9eff; padding-left: 1rem; margin: 1rem 0; color: #aaa; font-style: italic; }
.article-content ul, .article-content ol { padding-left: 1.5rem; margin-bottom: 1rem; }
.article-content li { margin-bottom: 0.3rem; }
.article-content strong { color: #fff; }
.article-content em { color: #aaa; }
.article-content hr { border: none; border-top: 1px solid #222; margin: 1.5rem 0; }
.article-list { margin-top: 3rem; border-top: 1px solid #222; padding-top: 2rem; }
.article-list h2 { color: #888; font-size: 1rem; margin-bottom: 1rem; }
.article-link { display: block; padding: 0.8rem 0; border-bottom: 1px solid #111; color: #4a9eff; text-decoration: none; }
.article-link:hover { color: #6ab5ff; }
.loading { color: #555; text-align: center; padding: 3rem; }
.back { display: inline-block; margin-bottom: 1.5rem; color: #4a9eff; text-decoration: none; font-size: 0.9rem; }
.back:hover { color: #6ab5ff; }
.error { color: #ff6b6b; text-align: center; padding: 2rem; }
</style>
</head>
<body>
<div class="container">
  <a href="/" class="back">← Back to Dashboard</a>
  <h1>📊 每日分析 Daily Analysis</h1>
  <p class="subtitle">川普推文 AI 三語分析｜Trump posts analyzed in 3 languages</p>

  <div class="lang-tabs">
    <button class="lang-tab active" data-lang="zh">中文</button>
    <button class="lang-tab" data-lang="en">English</button>
    <button class="lang-tab" data-lang="ja">日本語</button>
  </div>

  <div id="article" class="article-content">
    <div class="loading">載入中...</div>
  </div>

  <div id="archive" class="article-list">
    <h2>📁 歷史分析 Archive</h2>
    <div id="archive-list"></div>
  </div>
</div>

<script>
const API_BASE = '';
let currentLang = 'zh';
let currentDate = null;
let articleIndex = [];

// 簡易 Markdown → HTML
function md2html(md) {
  return md
    .replace(/^### (.*$)/gm, '<h3>$1</h3>')
    .replace(/^## (.*$)/gm, '<h2>$1</h2>')
    .replace(/^# (.*$)/gm, '<h1>$1</h1>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^> (.*$)/gm, '<blockquote>$1</blockquote>')
    .replace(/^- (.*$)/gm, '<li>$1</li>')
    .replace(/^---$/gm, '<hr>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(.+)$/gm, function(m) {
      if (m.startsWith('<')) return m;
      return '<p>' + m + '</p>';
    });
}

async function loadArticle(date, lang) {
  const el = document.getElementById('article');
  try {
    const resp = await fetch(`/articles/${date}/${lang}.md`);
    if (!resp.ok) throw new Error('not found');
    const text = await resp.text();
    el.innerHTML = md2html(text);
    currentDate = date;
  } catch(e) {
    el.innerHTML = '<div class="error">此日期尚無分析文章</div>';
  }
}

async function loadIndex() {
  // 嘗試載入文章索引
  try {
    const resp = await fetch('/articles/index.json');
    if (resp.ok) {
      articleIndex = await resp.json();
    }
  } catch(e) {}

  // 如果沒有 index，用日期猜最近 7 天
  if (!articleIndex.length) {
    const now = new Date();
    for (let i = 0; i < 14; i++) {
      const d = new Date(now - i * 86400000);
      const ds = d.toISOString().slice(0, 10);
      articleIndex.push(ds);
    }
  }

  // 載入最新的
  if (articleIndex.length) {
    loadArticle(articleIndex[0], currentLang);
  }

  // 渲染 archive 列表
  const listEl = document.getElementById('archive-list');
  articleIndex.forEach(date => {
    const a = document.createElement('a');
    a.className = 'article-link';
    a.href = '#';
    a.textContent = date;
    a.onclick = (e) => { e.preventDefault(); loadArticle(date, currentLang); window.scrollTo(0,0); };
    listEl.appendChild(a);
  });
}

// Tab 切換
document.querySelectorAll('.lang-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.lang-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentLang = tab.dataset.lang;
    if (currentDate) loadArticle(currentDate, currentLang);
  });
});

loadIndex();
</script>
</body>
</html>
